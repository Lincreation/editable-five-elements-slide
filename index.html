  {

    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker' data-editable='true'>研修の目的とゴール\u003c/div>\u003cdiv class='title' data-editable='true'>終わる頃には、\u003cspan class='accent'>一件を再現できる形\u003c/span>にできる\u003c/div>\u003cdiv class='sub' data-editable='true'>成果物を作るだけでなく、SkillとWorkflowへ育てる判断軸を持ち帰ります。\u003c/div>\u003cdiv class='goals'>\u003cdiv class='goal'>\u003cb>01\u003c/b>\u003cdiv>\u003cstrong data-editable='true'>GeminiとGensparkを使い分ける\u003c/strong>\u003cspan data-editable='true'>情報の場所・完成物・権限で選ぶ\u003c/span>\u003c/div>\u003c/div>\u003cdiv class='goal'>\u003cb>02\u003c/b>\u003cdiv>\u003cstrong data-editable='true'>主要4機能で成果物を作る\u003c/strong>\u003cspan data-editable='true'>Slides・Docs・Sheets・画像生成\u003c/span>\u003c/div>\u003c/div>\u003cdiv class='goal'>\u003cb>03\u003c/b>\u003cdiv>\u003cstrong data-editable='true'>基本の一巡を操作できる\u003c/strong>\u003cspan data-editable='true'>頼む・確認する・直す・出力する\u003c/span>\u003c/div>\u003c/div>\u003cdiv class='goal'>\u003cb>04\u003c/b>\u003cdiv>\u003cstrong data-editable='true'>再利用の設計を作れる\u003c/strong>\u003cspan data-editable='true'>Skill Card・Workflow Card・Test Record\u003c/span>\u003c/div>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "研修後のゴールを4つに絞ります。GeminiとGensparkを使い分け、主要4機能で成果物を作り、基本の一巡を操作し、最後に成功した一件をSkillとWorkflowへ育てる設計を作ります。定義を覚えるだけでなく、入力・出力・合格条件・停止地点を書いた3つのカードを持ち帰ります。\n\n【進行目安：2分】4つのゴールを読み、最後の成果物がSkill Card、Workflow Card、正常系・例外系のTest Recordであると先に示します。"

    "html": "\u003cdiv class='slide chapter no-page'>\u003cdiv class='num'>CHAPTER 01\u003c/div>\u003ch2 data-editable='true'>Gensparkは、\u003cbr>何を変えるのか\u003c/h2>\u003cp data-editable='true'>チャットの回答で終わらず、調査・加工・編集・出力をつないで、仕事で使う形まで進めます。\u003c/p>\u003cdiv class='word'>MAKE\u003c/div>\u003c/div>",

  {
    "title": "Gensparkは回答から成果物まで進める",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>GENSPARK\u003c/div>\u003cdiv class='title' data-editable='true'>「答えをもらう」から、\u003cspan class='accent'>使える形にする\u003c/span>へ\u003c/div>\u003cdiv class='sub' data-editable='true'>複数のモデルやツールを使い、仕事の途中工程をつなぎます。\u003c/div>\u003cdiv class='flow'>\u003cdiv class='flow-step'>\u003cdiv class='n'>01 INPUT\u003c/div>\u003ch3 data-editable='true'>頼む\u003c/h3>\u003cp data-editable='true'>目的・資料・完成形を渡す\u003c/p>\u003c/div>\u003cdiv class='flow-step'>\u003cdiv class='n'>02 PLAN\u003c/div>\u003ch3 data-editable='true'>考える\u003c/h3>\u003cp data-editable='true'>必要な作業を分ける\u003c/p>\u003c/div>\u003cdiv class='flow-step'>\u003cdiv class='n'>03 TOOL\u003c/div>\u003ch3 data-editable='true'>動かす\u003c/h3>\u003cp data-editable='true'>検索・計算・生成を行う\u003c/p>\u003c/div>\u003cdiv class='flow-step'>\u003cdiv class='n'>04 REVIEW\u003c/div>\u003ch3 data-editable='true'>確かめる\u003c/h3>\u003cp data-editable='true'>根拠・例外・表現を見る\u003c/p>\u003c/div>\u003cdiv class='flow-step'>\u003cdiv class='n'>05 OUTPUT\u003c/div>\u003ch3 data-editable='true'>仕上げる\u003c/h3>\u003cp data-editable='true'>資料・文書・表・画像へ\u003c/p>\u003c/div>\u003c/div>\u003cspan class='flow-arrow a1'>→\u003c/span>\u003cspan class='flow-arrow a2'>→\u003c/span>\u003cspan class='flow-arrow a3'>→\u003c/span>\u003cspan class='flow-arrow a4'>→\u003c/span>\u003cdiv class='source'>出典：Genspark Help Center「Super Agent」\u003c/div>\u003c/div>",
    "notes": "Gensparkの価値は、回答文だけではなく、使える成果物へ進めることです。依頼を読み、必要な作業を考え、検索や計算などのツールを使い、結果を資料・文書・表・画像として出します。ただし、完成したように見えても、確認責任までAIへ渡すわけではありません。\n\n【進行目安：2分30秒】身近な例として、会議メモから表を整理し、要点を資料へまとめる流れを口頭で示します。受講者に、最近AIの回答を成果物へ貼り直した経験があるか挙手してもらいます。"

  {
    "title": "GeminiとGensparkは仕上げる場所が違う",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>GEMINI × GENSPARK\u003c/div>\u003cdiv class='title' data-editable='true'>違いは賢さではなく、\u003cspan class='blue'>正本をどこに置くか\u003c/span>\u003c/div>\u003cdiv class='split'>\u003cdiv class='split-side'>\u003ch3 class='blue'>Gemini\u003c/h3>\u003cdiv class='best' data-editable='true'>Google Workspaceを正本にして進めたい\u003c/div>\u003cul>\u003cli data-editable='true'>Drive・Sheets・Slidesの既存権限で作業\u003c/li>\u003cli data-editable='true'>Google上で表や資料を生成・共同編集する\u003c/li>\u003cli data-editable='true'>組織のGoogle管理設定と保存先に沿う\u003c/li>\u003c/ul>\u003cdiv class='tagline'>Googleの仕事場で作り、残す\u003c/div>\u003c/div>\u003cdiv class='split-side'>\u003ch3 class='accent'>Genspark\u003c/h3>\u003cdiv class='best' data-editable='true'>専用ワークスペースで横断制作したい\u003c/div>\u003cul>\u003cli data-editable='true'>Excel・PDF・公開Webなどを取り込む\u003c/li>\u003cli data-editable='true'>複数工程からSlides・Docs・Sheetsへ展開\u003c/li>\u003cli data-editable='true'>SkillやWorkflowとして再利用する\u003c/li>\u003c/ul>\u003cdiv class='tagline'>複数の材料から成果物へ進める\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='source'>どちらか一方にしかできない、という比較ではありません｜Google／Genspark公式\u003c/div>\u003c/div>",
    "notes": "GeminiもGensparkも、調査、表、資料作成まで進められます。違いを能力の有無で断定しません。Google Drive、Sheets、Slidesを正本にし、既存権限と共同編集の中で作業するならGeminiが自然です。Excel、PDF、公開WebなどをGensparkの専用ワークスペースへ取り込み、複数成果物へ横断展開するならGensparkが自然です。最終判断は入力データ、完成物、保存先、権限で行います。\n\n【進行目安：4分】比較軸を、入力場所・完成物・保存先・権限の4つで説明します。ミニ確認として『Drive上の既存資料を共同編集する』『ExcelとPDFから新しい報告を作る』の2例を出し、どちらから始めるか隣の人と1分相談してもらいます。"
  },
  {
    "title": "入口は作りたい成果物から選ぶ",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>CHOICE\u003c/div>\u003cdiv class='title' data-editable='true'>最初に決めるのは、\u003cspan class='accent'>何を完成させたいか\u003c/span>\u003c/div>\u003cdiv class='decision'>\u003cdiv class='question'>\u003ch3 data-editable='true'>まだ作業の進め方が曖昧\u003c/h3>\u003cp data-editable='true'>目的はあるが、調査・表・資料のどれから始めるか分からない\u003c/p>\u003ch3 style='margin-top:42px;color:#8fd3c1'>Super Agentへ相談\u003c/h3>\u003c/div>\u003cdiv class='or'>OR\u003c/div>\u003cdiv class='answer'>\u003ch3 data-editable='true'>完成形式が決まっている\u003c/h3>\u003cp data-editable='true'>資料、文書、表、画像など、欲しい成果物が明確\u003c/p>\u003ch3 style='margin-top:42px'>専門機能へ直接入る\u003c/h3>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "迷ったらSuper Agentから相談します。一方で、資料を作る、文書をまとめる、表を分析する、画像を作ると決まっているなら、専門機能へ直接入る方が早く、意図も伝えやすくなります。実際のホーム画面ではNewメニューや入力欄から入口を選びます。\n\n【進行目安：2分】完成形式が曖昧ならSuper Agent、明確なら専門機能という二択で覚えます。口頭で3例を出し、受講者に入口を即答してもらいます。"
  },
  {
    "title": "AIエージェントはLLMとツールで動く",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>HOW AGENTS WORK\u003c/div>\u003cdiv class='title' data-editable='true'>AIエージェントは、\u003cspan class='accent'>頭・手・作業メモ\u003c/span>を持つ\u003c/div>\u003cdiv class='sub' data-editable='true'>専門用語は、実際の役割と一緒に覚えます。\u003c/div>\u003cdiv class='mechanism'>\u003cdiv class='machine'>\u003cdiv class='jp'>頭｜LLM\u003c/div>\u003ch3 data-editable='true'>次を決める\u003c/h3>\u003cp data-editable='true'>目的・指示・途中結果を読み、次の行動を選ぶ\u003c/p>\u003csmall>例：まずExcelを確認する\u003c/small>\u003c/div>\u003cdiv class='machine'>\u003cdiv class='jp'>手｜TOOLS\u003c/div>\u003ch3 data-editable='true'>道具を使う\u003c/h3>\u003cp data-editable='true'>検索、ファイル読取、計算、画像生成などを実行する\u003c/p>\u003csmall>例：表を集計してグラフ化する\u003c/small>\u003c/div>\u003cdiv class='machine'>\u003cdiv class='jp'>作業メモ｜CONTEXT\u003c/div>\u003ch3 data-editable='true'>文脈を持つ\u003c/h3>\u003cp data-editable='true'>会話・資料・結果を保持し、次の判断へ渡す\u003c/p>\u003csmall>例：修正前後を比較する\u003c/small>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "AIエージェントの基本構造です。LLMは頭として次の行動を決め、Toolsは検索・計算・ファイル操作などを実行します。Contextは依頼、資料、途中結果を次の判断へ渡す作業メモです。AIが賢いから何でもできるのではなく、使えるツールと渡された文脈の範囲で動きます。\n\n【進行目安：4分】LLM・Tools・Contextを、料理人の判断・調理道具・注文票と途中メモにたとえて説明します。1分確認として『AIエージェントはLLMに何を足した仕組みか』を隣の人へ一文で説明してもらいます。"
  },
  {
    "title": "LoopとPermissionで業務利用になる",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>CONTROL\u003c/div>\u003cdiv class='title' data-editable='true'>繰り返す力より、\u003cspan class='amber'>止める設計\u003c/span>が重要\u003c/div>\u003cdiv class='loop'>\u003cdiv class='ring'>\u003c/div>\u003cdiv class='core'>AGENT\u003cbr>LOOP\u003c/div>\u003cdiv class='loop-label one'>計画\u003c/div>\u003cdiv class='loop-label two'>実行\u003c/div>\u003cdiv class='loop-label three'>観察\u003c/div>\u003cdiv class='loop-label four'>修正\u003c/div>\u003c/div>\u003cdiv class='guardrail'>\u003ch3 data-editable='true'>業務で必要な4つの制御\u003c/h3>\u003cdiv class='rule'>\u003cb>STATE\u003c/b>途中結果を持つ\u003c/div>\u003cdiv class='rule'>\u003cb>LIMIT\u003c/b>回数と範囲を決める\u003c/div>\u003cdiv class='rule'>\u003cb>PERMISSION\u003c/b>使える道具を絞る\u003c/div>\u003cdiv class='rule'>\u003cb>APPROVAL\u003c/b>送信・削除の前で人が止める\u003c/div>\u003c/div>\u003c/div>",
    "notes": "エージェントは計画・実行・観察・修正を繰り返します。しかし、業務で重要なのは自律性の高さだけではありません。何回まで行うか、何を触ってよいか、どの操作で人の承認を入れるかを決めます。特に送信、削除、公開、決済、正本更新は人が止める設計にします。\n\n【進行目安：4分】Loopは自律性、State・Limit・Permission・Approvalは制御だと対比します。送信・削除・公開・決済のどこで人が止めるか、チャットへ一つ投稿してもらいます。"
  },
  {
    "title": "基本操作は4段階",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>BASIC OPERATION\u003c/div>\u003cdiv class='title' data-editable='true'>基本操作は、\u003cspan class='accent'>頼む・見る・直す・出す\u003c/span>\u003c/div>\u003cdiv class='sub' data-editable='true'>一回の指示で完成を狙わず、対話しながら仕上げます。\u003c/div>\u003cdiv class='steps4'>\u003cdiv class='step4'>\u003cdiv class='circle'>1\u003c/div>\u003ch3 data-editable='true'>頼む\u003c/h3>\u003cp data-editable='true'>目的、対象者、資料、完成形式、制約を伝える\u003c/p>\u003c/div>\u003cdiv class='step4'>\u003cdiv class='circle'>2\u003c/div>\u003ch3 data-editable='true'>見る\u003c/h3>\u003cp data-editable='true'>構成、根拠、数字、例外、見た目を確認する\u003c/p>\u003c/div>\u003cdiv class='step4'>\u003cdiv class='circle'>3\u003c/div>\u003ch3 data-editable='true'>直す\u003c/h3>\u003cp data-editable='true'>ページや範囲を指定し、良い部分を残して修正する\u003c/p>\u003c/div>\u003cdiv class='step4'>\u003cdiv class='circle'>4\u003c/div>\u003ch3 data-editable='true'>出す\u003c/h3>\u003cp data-editable='true'>用途に合う形式で出力し、開き直して確認する\u003c/p>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "すべての機能に共通する基本操作です。最初に頼み、結果を見て、範囲を絞って直し、最後に出力します。一回の長いプロンプトで完成させるより、構成、内容、見た目の順に確認すると手戻りが減ります。\n\n【進行目安：4分】同じ依頼を4段階で実演口調にします。『全部作って』ではなく、まず頼み、構成を見る、1箇所直す、出力して開き直す、と順に進める理由を説明します。"

  {

    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>REQUEST\u003c/div>\u003cdiv class='title' data-editable='true'>良い依頼は、\u003cspan class='accent'>5つの材料\u003c/span>で作る\u003c/div>\u003cdiv class='prompt' data-editable='true'>\u003cmark>店舗責任者の判断を早めるために\u003c/mark>、\u003cmark>週次会議の参加者向け\u003c/mark>に、\u003cmark>添付した研修用Excel\u003c/mark>から、\u003cmark>結論先行の3ページ資料\u003c/mark>を作成してください。\u003cmark>推測で補わず、要確認を分ける\u003c/mark>こと。\u003c/div>\u003cdiv class='prompt-legend'>\u003cspan>目的\u003c/span>\u003cspan>対象者\u003c/span>\u003cspan>参考資料\u003c/span>\u003cspan>完成形式\u003c/span>\u003cspan>制約・確認基準\u003c/span>\u003c/div>\u003c/div>",
    "notes": "依頼の5要素は、目的、対象者、参考資料、完成形式、制約です。特に最後の制約には、してはいけないことと、人が確認したいことを書きます。例えば、推測で補わない、元の金額を変えない、根拠を示す、要確認を分ける、といった条件です。\n\n【進行目安：4分】5色の箇所を一つずつ確認します。45秒で自分の業務を5要素に書き換え、1名分だけチャット例を読み上げます。制約には禁止事項だけでなく、合格条件と要確認の扱いも入れると補足します。"

  {

    "notes": "ここから主要4機能です。スライドでは、何ができるかと、どんな場面で選ぶかに絞ります。細かいボタンや設定は、この後の画面共有で確認します。\n\n【進行目安：30秒】ここからは画面名の暗記ではなく、成果物ごとの入口選択です。実画面は後半で見せると予告します。"

  {
    "title": "主要4機能は成果物で選ぶ",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>FOUR WORKSPACES\u003c/div>\u003cdiv class='title' data-editable='true'>作りたい形が決まれば、\u003cspan class='accent'>入口も決まる\u003c/span>\u003c/div>\u003cdiv class='feature-map'>\u003cdiv class='f'>\u003cdiv class='icon'>▰\u003c/div>\u003ch3 data-editable='true'>AI Slides\u003c/h3>\u003cp data-editable='true'>説明・提案・報告を、構成とデザインを持つ資料へ\u003c/p>\u003c/div>\u003cdiv class='f'>\u003cdiv class='icon'>▤\u003c/div>\u003ch3 data-editable='true'>AI Docs\u003c/h3>\u003cp data-editable='true'>調査やメモを、読み返せる文書・レポートへ\u003c/p>\u003c/div>\u003cdiv class='f'>\u003cdiv class='icon'>▦\u003c/div>\u003ch3 data-editable='true'>AI Sheets\u003c/h3>\u003cp data-editable='true'>表データを、集計・分析・可視化されたシートへ\u003c/p>\u003c/div>\u003cdiv class='f'>\u003cdiv class='icon'>◩\u003c/div>\u003ch3 data-editable='true'>画像生成\u003c/h3>\u003cp data-editable='true'>意図や参考画像を、用途に合うビジュアルへ\u003c/p>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "4つの入口を成果物で覚えます。資料はAI Slides、文書はAI Docs、表はAI Sheets、ビジュアルは画像生成です。迷ったらSuper Agentへ相談できますが、完成形式が明確なら直接入ります。\n\n【進行目安：1分】4機能を『資料・文書・表・ビジュアル』の名詞で覚えます。2つの業務例を読み、どの入口か挙手またはチャットで答えてもらいます。"

  {
    "title": "AI Slidesは構成から資料を作る",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>AI SLIDES\u003c/div>\u003cdiv class='title' data-editable='true'>構成を相談し、\u003cspan class='accent'>ページ単位で資料\u003c/span>にする\u003c/div>\u003cdiv class='feature-layout'>\u003cdiv class='feature-copy'>\u003cdiv class='verb'>THINK → STRUCTURE → DESIGN\u003c/div>\u003ch3 data-editable='true'>資料の骨子と見せ方を、一つの作業場で整える\u003c/h3>\u003cp data-editable='true'>目的・対象者・ページ数・結論・参考資料を渡し、構成を確認してから生成。必要な箇所だけ選んで直します。\u003c/p>\u003cdiv class='use' data-editable='true'>使いどころ｜社内報告・提案・研修・企画説明\u003c/div>\u003c/div>\u003cdiv class='preview'>\u003cdiv class='windowbar'>\u003ci class='dot'>\u003c/i>\u003ci class='dot'>\u003c/i>\u003ci class='dot'>\u003c/i>\u003c/div>\u003cdiv class='slides-mini'>\u003cdiv>結論を先に伝える\u003c/div>\u003cdiv>\u003cspan class='short'>\u003c/span>\u003cspan>\u003c/span>\u003cspan>\u003c/span>\u003c/div>\u003cdiv>\u003cspan class='short'>\u003c/span>\u003cspan>\u003c/span>\u003cspan>\u003c/span>\u003c/div>\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='source'>出典：Genspark Help Center「AI Slides」\u003c/div>\u003c/div>",
    "notes": "AI Slidesは、テーマを渡して見た目だけを作る機能ではありません。目的や対象者を確認し、構成を組み、資料を生成し、部分修正して出力する作業場です。重要な資料や初めて作る資料では、生成前に構成案を確認します。実演では入口、モード、構成確認、部分修正、出力場所を見せます。\n\n【進行目安：3分】AI Slidesでは生成前の構成承認がコストと手戻りを減らすと説明します。3ページなら、誰向け・結論・各ページの役割を先に決める具体例を示します。"
  },
  {
    "title": "AI Docsは共有できる文書へまとめる",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>AI DOCS\u003c/div>\u003cdiv class='title' data-editable='true'>メモや調査を、\u003cspan class='blue'>読める文書\u003c/span>へ整える\u003c/div>\u003cdiv class='feature-layout'>\u003cdiv class='feature-copy'>\u003cdiv class='verb blue'>DRAFT → EDIT → VERSION\u003c/div>\u003ch3 data-editable='true'>文章の構造、表現、版を管理しながら仕上げる\u003c/h3>\u003cp data-editable='true'>Rich TextとMarkdownを選び、文書を生成。文章を選択してAI Editし、Save Pointで変更履歴を確認できます。\u003c/p>\u003cdiv class='use' data-editable='true'>使いどころ｜報告書・手順書・議事メモ・調査レポート\u003c/div>\u003c/div>\u003cdiv class='preview'>\u003cdiv class='windowbar'>\u003ci class='dot'>\u003c/i>\u003ci class='dot'>\u003c/i>\u003ci class='dot'>\u003c/i>\u003c/div>\u003cdiv class='doc-mini'>\u003cb>週次レポート\u003c/b>\u003ci>\u003c/i>\u003cspan>\u003c/span>\u003cspan>\u003c/span>\u003cspan>\u003c/span>\u003cspan>\u003c/span>\u003cspan>\u003c/span>\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='source'>出典：Genspark Help Center「AI Docs」\u003c/div>\u003c/div>",
    "notes": "AI Docsは文書作成の作業場です。Rich Textは見た目を整えた業務文書、Markdownは構造を重視する技術文書などに向きます。文章を選択して部分編集でき、Save Pointで版を確認できます。ただし、生成内容の正しさや共有範囲は人が確認します。\n\n【進行目安：2分】AI Docsは長文生成の紹介ではなく、読み返せる構造・部分編集・版管理が価値だと説明します。議事メモを週次報告へ整える例でSlidesとの違いを確認します。"
  },
  {
    "title": "AI Sheetsは表を開いたまま分析する",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>AI SHEETS\u003c/div>\u003cdiv class='title' data-editable='true'>表を見ながら、\u003cspan class='amber'>自然言語で分析\u003c/span>を進める\u003c/div>\u003cdiv class='feature-layout'>\u003cdiv class='feature-copy'>\u003cdiv class='verb amber'>CLEAN → ANALYZE → VISUALIZE\u003c/div>\u003ch3 data-editable='true'>Excelを読み、整理・計算・可視化する\u003c/h3>\u003cp data-editable='true'>XLSXを読み込み、複数シートをまたいだ分析、数式、表の整形、グラフ作成を依頼できます。\u003c/p>\u003cdiv class='use' data-editable='true'>使いどころ｜分類・集計・比較・傾向分析・グラフ\u003c/div>\u003c/div>\u003cdiv class='preview sheet-preview'>\u003cimg src='./assets/ai-sheets-ui.png' alt='AI Sheetsの操作イメージ' data-replaceable='true'>\u003c/div>\u003c/div>\u003cdiv class='source'>出典：Genspark Help Center「AI Sheets」\u003c/div>\u003c/div>",
    "notes": "AI SheetsはGenspark内の表計算エージェントです。Google Sheetsのアドオンではありません。Excelファイルを読み込み、整理、分析、数式、可視化を会話で依頼できます。実演では研修用Excelを使い、元データを変えない、判断理由を残す、曖昧な行は要確認にする、総額を照合する、という確認設計を見せます。\n\n【進行目安：4分】研修Excelの2シート、13明細、858,640円を例に、分類だけでなく元データ保持・例外抽出・総額照合までが仕事だと説明します。『判断できない行をAIはどう扱うべきか』を問い、要確認と確認質問へつなげます。"
  },
  {
    "title": "画像生成は用途と構図を先に決める",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>AI IMAGE\u003c/div>\u003cdiv class='title' data-editable='true'>「何を描くか」より、\u003cspan style='color:#75579b'>どこで使うか\u003c/span>から決める\u003c/div>\u003cdiv class='feature-layout'>\u003cdiv class='feature-copy'>\u003cdiv class='verb' style='color:#75579b'>PURPOSE → COMPOSITION → ITERATE\u003c/div>\u003ch3 data-editable='true'>用途・比率・構図・参考画像を渡して作る\u003c/h3>\u003cp data-editable='true'>資料の挿絵、告知ビジュアル、商品イメージなど、使う場所を先に指定。生成後は部分編集や別案比較で詰めます。\u003c/p>\u003cdiv class='use' data-editable='true'>確認点｜文字・人物・ロゴ・権利・事実表現\u003c/div>\u003c/div>\u003cdiv class='preview'>\u003cdiv class='windowbar'>\u003ci class='dot'>\u003c/i>\u003ci class='dot'>\u003c/i>\u003ci class='dot'>\u003c/i>\u003c/div>\u003cdiv class='image-mini'>\u003cdiv>\u003c/div>\u003cdiv>\u003c/div>\u003cdiv>\u003c/div>\u003cdiv>\u003c/div>\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='source'>出典：Genspark Image Agent／Genspark Design 公式ページ\u003c/div>\u003c/div>",
    "notes": "画像生成では、単にきれいな画像を頼むのではなく、使用目的、比率、構図、色、避けたい表現を伝えます。参考画像を使う場合も、利用権限を確認します。文字、人物、ロゴ、商品、店舗表現は誤りや権利問題が出やすいため、公開前に必ず人が確認します。\n\n【進行目安：2分】画像生成は用途から逆算します。週次報告の表紙なら、比率・余白・文字禁止・ロゴ禁止まで指定する例を示し、公開前の権利・人物・文字確認を強調します。"
  },
  {
    "title": "その他の機能は必要になった時に選ぶ",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>MORE\u003c/div>\u003cdiv class='title' data-editable='true'>その他の機能は、\u003cspan class='accent'>必要になった時に\u003c/span>\u003c/div>\u003cdiv class='sub' data-editable='true'>今日は存在と用途だけを押さえます。契約・権限・社内ルールを確認してから使います。\u003c/div>\u003cdiv class='extras'>\u003cdiv class='extra'>\u003cdiv class='x'>01\u003c/div>\u003ch3 data-editable='true'>Genspark Code\u003c/h3>\u003cp data-editable='true'>Webツールやアプリを作る\u003c/p>\u003c/div>\u003cdiv class='extra'>\u003cdiv class='x'>02\u003c/div>\u003ch3 data-editable='true'>Genspark Design\u003c/h3>\u003cp data-editable='true'>ポスターや販促物を作る\u003c/p>\u003c/div>\u003cdiv class='extra'>\u003cdiv class='x'>03\u003c/div>\u003ch3 data-editable='true'>Meeting Notes\u003c/h3>\u003cp data-editable='true'>会議を記録し整理する\u003c/p>\u003c/div>\u003cdiv class='extra'>\u003cdiv class='x'>04\u003c/div>\u003ch3 data-editable='true'>Custom Agent\u003c/h3>\u003cp data-editable='true'>用途別の専用エージェントを作る\u003c/p>\u003c/div>\u003cdiv class='extra'>\u003cdiv class='x'>05\u003c/div>\u003ch3 data-editable='true'>Connectors\u003c/h3>\u003cp data-editable='true'>外部サービスと接続する\u003c/p>\u003c/div>\u003c/div>\u003c/div>",

  },
  {
    "title": "第3章 SkillsとWorkflows",
    "html": "\u003cdiv class='slide chapter no-page'>\u003cdiv class='num'>CHAPTER 03\u003c/div>\u003ch2 data-editable='true'>一件の成功を、\u003cbr>誰でも再現できる形にする\u003c/h2>\u003cp data-editable='true'>Skillは作り方、Workflowは実行手順。カードとテストで安全に標準化します。\u003c/p>\u003cdiv class='word'>REPEAT\u003c/div>\u003c/div>",
    "notes": "ここからSkillsとWorkflowsです。一件うまくいっただけでは企業の標準業務にはなりません。Skill Cardで入力・判断・品質を言語化し、Workflow Cardで開始・処理・停止を設計し、Test Recordで正常系と例外系を確かめて、初めて他の人へ渡せます。\n\n【進行目安：1分】章の問いを『どうすれば別の人が安全に同じ判断を再現できるか』へ切り替えます。3つのカードがこの章の持ち帰り成果物だと示します。"
  },
  {
    "title": "Skillは成功した作り方を仕様にする",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>SKILL CARD\u003c/div>\u003cdiv class='title' data-editable='true'>Skillは、\u003cspan class='accent'>成功した作り方\u003c/span>を仕様にする\u003c/div>\u003cdiv class='skillvisual'>\u003cimg src='./assets/img-skills.jpg' alt='知識や基準を束ねて再利用するイメージ' data-replaceable='true'>\u003cdiv class='skillcopy'>\u003ch3 data-editable='true'>同じ判断を再現する4つの契約\u003c/h3>\u003cdiv class='layer'>\u003cb>INPUT\u003c/b>許可された入力・正本\u003c/div>\u003cdiv class='layer'>\u003cb>LOGIC\u003c/b>判断手順・参照資料\u003c/div>\u003cdiv class='layer'>\u003cb>QUALITY\u003c/b>合格条件・NG・例外\u003c/div>\u003cdiv class='layer'>\u003cb>OUTPUT\u003c/b>完成形式・Owner・Version\u003c/div>\u003c/div>\u003c/div>\u003cdiv class='source'>出典：Genspark Help Center「Skills」\u003c/div>\u003c/div>",
    "notes": "Genspark公式はSkillを、特定の仕事向けに再利用できるAIツールと説明しています。企業で大切なのは名前を付けることではなく、何を入れてよいか、何を正本に判断するか、何を合格とするか、誰が更新するかをSkill Cardに固定することです。Skillは品質を保証するのではなく、ばらつきを減らすための仕様です。\n\n【進行目安：3分】INPUT、LOGIC、QUALITY、OUTPUTを週次支出チェックへ当てはめます。最後にOwnerとVersionがなければ、内容が古くなっても直す人が分からないと説明します。"
  },
  {
    "title": "Workflowは手順と停止条件を実行する",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>WORKFLOWS\u003c/div>\u003cdiv class='title' data-editable='true'>Workflowは、\u003cspan class='amber'>手順と停止条件\u003c/span>を実行する\u003c/div>\u003cdiv class='sub' data-editable='true'>公式画面で確認する要素。研修は模擬データのTest Runまでです。\u003c/div>\u003cdiv class='workflow-line'>\u003cdiv class='wf'>\u003cdiv class='n'>01 TRIGGER\u003c/div>\u003ch3 data-editable='true'>Schedule / Email\u003c/h3>\u003c/div>\u003cdiv class='wf'>\u003cdiv class='n'>02 ACTION\u003c/div>\u003ch3 data-editable='true'>読む・作る\u003c/h3>\u003c/div>\u003cdiv class='wf'>\u003cdiv class='n'>03 TEST RUN\u003c/div>\u003ch3 data-editable='true'>模擬で試す\u003c/h3>\u003c/div>\u003cdiv class='wf approval'>\u003cdiv class='n'>04 CONFIRM\u003c/div>\u003ch3 data-editable='true'>人の確認待ち\u003c/h3>\u003c/div>\u003cdiv class='wf'>\u003cdiv class='n'>05 HISTORY\u003c/div>\u003ch3 data-editable='true'>結果を記録\u003c/h3>\u003c/div>\u003cdiv class='wf'>\u003cdiv class='n'>06 TURN ON\u003c/div>\u003ch3 data-editable='true'>本番化・今日はしない\u003c/h3>\u003c/div>\u003c/div>\u003cdiv class='workflow-hint' data-editable='true'>1 Workflow = 1 Trigger｜例外時は止める｜Turn Onは管理者承認後\u003c/div>\u003cdiv class='source'>出典：Genspark Help Center「Workflows」\u003c/div>\u003c/div>",
    "notes": "Workflowは、TriggerとActionを組み合わせて繰り返し業務を動かす機能です。現在の公式情報では、一つのWorkflowに一つのTriggerを設定し、ScheduleまたはEmailで開始できます。Test Runは模擬データを使い、実メール送信やデータ変更を起こさずに確認する機能です。Pending ConfirmationとRun Historyで、人の確認待ちと実行結果を見ます。\n\n【進行目安：3分】この6要素は公式画面で確認できる言葉に限定しています。Turn Onは実動作だと明確に区別し、研修では押さないこと、例外2件なら確認待ち、差額不一致や必須列欠落なら停止と説明します。"
  },
  {
    "title": "Skillは作り方、Workflowは実行順",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>SKILL × WORKFLOW\u003c/div>\u003cdiv class='title' data-editable='true'>再利用する契約が違う\u003c/div>\u003cdiv class='matrix'>\u003cdiv class='head'>\u003c/div>\u003cdiv class='head'>SKILL\u003c/div>\u003cdiv class='head'>WORKFLOW\u003c/div>\u003cdiv class='rowhead'>再利用するもの\u003c/div>\u003cdiv class='skillcol'>入力・判断・出力・品質\u003c/div>\u003cdiv class='wfcol'>Trigger・Action・停止・履歴\u003c/div>\u003cdiv class='rowhead'>使う前の成果物\u003c/div>\u003cdiv class='skillcol'>Skill Card＋NG・例外\u003c/div>\u003cdiv class='wfcol'>正常/例外Test＋Owner・復旧\u003c/div>\u003cdiv class='rowhead'>研修での範囲\u003c/div>\u003cdiv class='skillcol'>設計／承認済みSkillの試行\u003c/div>\u003cdiv class='wfcol'>Workflow Card／Test Runまで\u003c/div>\u003c/div>\u003c/div>",
    "notes": "Skillは作り方の契約、Workflowは実行順の契約です。Skill Cardには入力、判断、出力、合格条件、NG、Owner、Versionを書きます。Workflow CardにはTrigger、Action、停止条件、保存先、履歴、手動復旧、最小権限を書き、正常系と例外系を試します。Workflowの中で承認済みSkillを使うこともあります。\n\n【進行目安：3分】週次支出チェックを例に、差額0円という判断基準はSkill、毎週月曜開始と例外時の確認待ちはWorkflowと分類します。受講者に別の一件を30秒で分類してもらいます。"
  },
  {
    "title": "自動化は一件の成功から段階的に",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>MATURITY PATH\u003c/div>\u003cdiv class='title' data-editable='true'>いきなり自動化せず、\u003cspan class='accent'>4段階で育てる\u003c/span>\u003c/div>\u003cdiv class='roles'>\u003cdiv class='role'>\u003csmall>01 ONE-OFF\u003c/small>\u003ch3 data-editable='true'>一件を成功\u003c/h3>\u003cp data-editable='true'>小さく安全な仕事で結果と確認方法を固める\u003c/p>\u003c/div>\u003cdiv class='role'>\u003csmall>02 SPEC\u003c/small>\u003ch3 data-editable='true'>合格条件を固定\u003c/h3>\u003cp data-editable='true'>合格・NG・例外を他の人が読める言葉にする\u003c/p>\u003c/div>\u003cdiv class='role'>\u003csmall>03 SKILL\u003c/small>\u003ch3 data-editable='true'>作り方を再利用\u003c/h3>\u003cp data-editable='true'>Skill CardにOwnerとVersionを付ける\u003c/p>\u003c/div>\u003cdiv class='role'>\u003csmall>04 WORKFLOW\u003c/small>\u003ch3 data-editable='true'>手順を検証\u003c/h3>\u003cp data-editable='true'>正常・例外をTestし、承認後に本番化する\u003c/p>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "企業での安全な順序は、一件を成功させ、合格条件を固定し、Skillで作り方を再利用し、最後にWorkflowで実行順を検証する流れです。先に自動化すると、曖昧な判断や誤りまで高速に繰り返します。3つの成果物はSkill Card、Workflow Card、Test Recordです。\n\n【進行目安：3分】週次支出チェックを4段階でたどります。隣の人がカードだけで同じ判断と停止を再現できる状態を合格とし、未検証のままTurn Onしないと確認します。"
  },
  {
    "title": "企業利用は実行・公開・有効化を分ける",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>ENTERPRISE GOVERNANCE\u003c/div>\u003cdiv class='title' data-editable='true'>企業利用は、\u003cspan class='accent'>実行・公開・有効化\u003c/span>を分ける\u003c/div>\u003cdiv class='safety'>\u003cdiv class='safe'>\u003ch3 data-editable='true'>受講者が今日行う\u003c/h3>\u003cul>\u003cli data-editable='true'>架空・公開・許可済みデータで実行\u003c/li>\u003cli data-editable='true'>承認済みSkillがあれば試行\u003c/li>\u003cli data-editable='true'>Skill / Workflow Cardを設計\u003c/li>\u003cli data-editable='true'>Test Run・履歴の確認まで\u003c/li>\u003c/ul>\u003c/div>\u003cdiv class='stop'>\u003ch3 data-editable='true'>Owner / 管理者が判断\u003c/h3>\u003cul>\u003cli data-editable='true'>Team公開・Peer Share・Public Link\u003c/li>\u003cli data-editable='true'>Connector・OAuth・外部送信\u003c/li>\u003cli data-editable='true'>WorkflowのTurn On・更新・削除\u003c/li>\u003cli data-editable='true'>監査・復旧・Version管理\u003c/li>\u003c/ul>\u003c/div>\u003c/div>\u003cdiv class='source'>左は研修範囲、右は社内運用ルール。契約・権限は当日画面で確認します。\u003c/div>\u003c/div>",
    "notes": "これはGenspark画面の機能一覧ではなく、企業利用の役割分担です。受講者は研修用データで成果物と設計カードを作り、利用可能なら承認済みSkillの試行とTest Runまで行います。Team公開、共有リンク、Connector認証、Turn On、更新や削除はOwnerまたは管理者が判断します。\n\n【進行目安：2分】左右の境界を読みます。特にTest RunとTurn On、個人用の試行とTeam公開を混ぜないことを確認し、送信・公開・接続・削除は研修中に行わないと宣言します。"
  },
  {
    "title": "60分パートのまとめ",
    "html": "\u003cdiv class='slide'>\u003cdiv class='kicker'>KEY TAKEAWAYS\u003c/div>\u003cdiv class='title' data-editable='true'>作る → そろえる → 試す → 承認する\u003c/div>\u003cdiv class='summary'>\u003cdiv class='line'>\u003cb>01 CREATE\u003c/b>\u003cspan data-editable='true'>小さく安全な一件を、主要機能で成功させる\u003c/span>\u003c/div>\u003cdiv class='line'>\u003cb>02 STANDARDIZE\u003c/b>\u003cspan data-editable='true'>Skill Cardで入力・判断・合格条件をそろえる\u003c/span>\u003c/div>\u003cdiv class='line'>\u003cb>03 TEST\u003c/b>\u003cspan data-editable='true'>Workflowを正常系・例外系でTest Runする\u003c/span>\u003c/div>\u003cdiv class='line'>\u003cb>04 GOVERN\u003c/b>\u003cspan data-editable='true'>Owner・権限・停止条件を確認してから本番化する\u003c/span>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "60分パートをまとめます。主要機能で一件を作り、Skill Cardで作り方をそろえ、Workflowを正常系と例外系で試し、Ownerと管理者が承認してから本番化します。SkillやWorkflowを使うこと自体が目的ではなく、別の人が安全に同じ判断と停止を再現できることが目的です。\n\n【進行目安：1分】CREATE、STANDARDIZE、TEST、GOVERNの4語を復唱し、ここから画面共有で実際の成果物から3つのカードを抽出すると予告します。"
  },
  {
    "title": "30分の画面共有で見るポイント",
    "html": "\u003cdiv class='slide live'>\u003cdiv class='kicker'>LIVE DEMO｜30 MIN\u003c/div>\u003cdiv class='title' data-editable='true'>成果物から、\u003cspan style='color:#75c7b2'>再現できる仕組み\u003c/span>へ\u003c/div>\u003cdiv class='sub' data-editable='true'>一件を作り、成功条件を抽出し、模擬データで停止まで確かめます。\u003c/div>\u003cdiv class='demo-grid'>\u003cdiv class='demo-item'>\u003cdiv class='mins'>0–11 MIN\u003c/div>\u003ch3 data-editable='true'>Home → Sheets\u003c/h3>\u003cp data-editable='true'>入口、Excel読込、13件・総額・例外・差額を確認\u003c/p>\u003c/div>\u003cdiv class='demo-item'>\u003cdiv class='mins'>11–18 MIN\u003c/div>\u003ch3 data-editable='true'>Slides / Docs / 画像\u003c/h3>\u003cp data-editable='true'>確認済み要点から、目的別の成果物へ展開\u003c/p>\u003c/div>\u003cdiv class='demo-item'>\u003cdiv class='mins'>18–30 MIN\u003c/div>\u003ch3 data-editable='true'>Skill Card → Workflow Test\u003c/h3>\u003cp data-editable='true'>作り方を仕様化し、正常・例外・停止・履歴を確認\u003c/p>\u003c/div>\u003c/div>\u003c/div>",
    "notes": "画面共有は一つの仕事としてつなぎます。0〜2分でホームと入口、2〜11分でAI Sheetsへ研修用Excelを読み込み、13件、858,640円、差額0円、例外2件を確認します。11〜15分でAI Slides、15〜16分でAI Docs、16〜18分で画像生成を見せます。18〜23分は成功条件からSkill Cardを作り、講師用環境でMy Own Skillを試行します。23〜30分はWorkflow CardをもとにTest Runし、正常系・例外系・停止・Pending Confirmation・Run Historyを確認します。\n\n【進行目安：30分】Home 0〜2分、Sheets 2〜11分、Slides 11〜15分、Docs 15〜16分、画像16〜18分、Skill 18〜23分、Workflow 23〜30分です。生成待ちは打ち切り基準で止め、完成済みバックアップを使います。"
  },
  {
    "title": "27分で3つの証拠を完成",
    "html": "\u003cdiv class='slide exercise'>\u003cdiv class='kicker'>HANDS-ON｜27 MIN\u003c/div>\u003cdiv class='title' data-editable='true'>一件を、\u003cspan class='accent'>再現できる設計\u003c/span>にする\u003c/div>\u003cdiv class='sub' data-editable='true'>完成物：Skill Card＋Workflow Card＋3ケースのTest Record\u003c/div>\u003cdiv class='exercise-list'>\u003cdiv>\u003cb>0–9 MIN\u003c/b>\u003cstrong data-editable='true'>入力確認 → Sheets／完成例で照合\u003c/strong>\u003c/div>\u003cdiv>\u003cb>9–16 MIN\u003c/b>\u003cstrong data-editable='true'>Skill Card：空欄3項目を完成\u003c/strong>\u003c/div>\u003cdiv>\u003cb>16–23 MIN\u003c/b>\u003cstrong data-editable='true'>Workflow Card：空欄3項目を完成\u003c/strong>\u003c/div>\u003c/div>\u003cdiv class='task'>\u003cdiv class='big'>23–27\u003c/div>\u003ch3 data-editable='true'>3ケースを照合\u003c/h3>\u003cp data-editable='true'>専用Excelで正常・例外・Hard Stopを確認。\u003cbr>期待結果と証拠が一致すれば合格です。\u003c/p>\u003c/div>\u003c/div>",
    "notes": "0〜4分で入力とゴールを確認し、4〜9分でAI Sheetsまたは完成済み例を使って13件、858,640円、差額0円、例外2件を照合します。INV-3112は詳細不足、INV-3104-再送は重複候補です。9〜16分はSkill Cardの空欄3項目、16〜23分はWorkflow Cardの空欄3項目を埋めます。23〜27分は専用のテスト証拠Excelを開き、3件・600,000円の正常系と例外系、差額1,000円かつ必須ID欠落のHard Stopを照合します。これはGenspark Run Historyの実ログではなく、停止設計を表上で確かめるテーブルテストです。\n\n【進行目安：27分＋次ページ3分】入力4分、Sheets照合5分、Skill Card 7分、Workflow Card 7分、Test Record 4分です。受講者は新規Skillの共有やWorkflowのTurn Onを行わず、2枚の設計カードと3ケースのTest Recordの完成を合格とします。"
  },
  {
    "title": "明日Skill候補にする一件を決める",
    "html": "\u003cdiv class='slide close no-page'>\u003ch2 data-editable='true'>最初の一件は、\u003cbr>\u003cspan class='accent'>小さく成功させてから標準化\u003c/span>する\u003c/h2>\u003cdiv class='question' data-editable='true'>明日、どの仕事をSkill候補として整えますか？\u003c/div>\u003cdiv class='write' data-editable='true'>私は「　　　　　　　　　　　　」の合格条件を書く\u003c/div>\u003cdiv class='three'>\u003cspan>架空・公開・許可済みデータ\u003c/span>\u003cspan>Owner・Version・停止条件\u003c/span>\u003cspan>本番化はテストと承認の後\u003c/span>\u003c/div>\u003c/div>",
    "notes": "最後に、自分の仕事でSkill候補にする一件を決めます。いきなりWorkflowで自動化せず、まず小さな一件を通常の依頼で成功させ、合格条件と例外を言語化します。Skill CardにOwnerとVersionを付け、Workflowは正常系と例外系をTest Runし、管理者承認後に初めて本番化します。\n\n【進行目安：3分】隣の人と入力契約、合格条件、停止条件、承認者を確認し、残りを質問に使います。最後に明日Skill候補にする一件を書いて締めます。"
  }
]

  <script>
  (function(){
    var data=JSON.parse(document.getElementById('deckData').textContent),root=document.getElementById('slidesRoot'),tocList=document.getElementById('tocList');
    function render(){
      if(!root.children.length){data.forEach(function(item,i){var wrap=document.createElement('div');wrap.className='slide-wrap'+(i===0?' active':'');wrap.dataset.slide=String(i+1);wrap.setAttribute('aria-hidden',String(i!==0));wrap.innerHTML=item.html;var slide=wrap.querySelector('.slide');if(slide)slide.dataset.page=String(i+1).padStart(2,'0');root.appendChild(wrap)})}
      if(!tocList.children.length){data.forEach(function(item,i){var b=document.createElement('button');b.className='toc-item'+(i===0?' current':'');b.type='button';b.dataset.goSlide=String(i+1);b.innerHTML='<span>'+String(i+1).padStart(2,'0')+'</span><strong>'+item.title+'</strong>';tocList.appendChild(b)})}
    }
    render();
    var slides=Array.prototype.slice.call(document.querySelectorAll('.slide-wrap')),stage=document.getElementById('stage'),panel=document.getElementById('scriptPanel'),text=document.getElementById('scriptText'),picker=document.getElementById('imagePicker');
    var index=0,editing=false,imageTarget=null,initialized=false,noteKey='genspark-talk-script-v3:'+document.documentElement.dataset.documentId;
    try{var saved=JSON.parse(localStorage.getItem(noteKey)||'{}');data.forEach(function(item){if(typeof saved[item.title]==='string')item.notes=saved[item.title]})}catch(e){}
    function currentFromHash(){var m=location.hash.match(/slide=(\d+)/);return m?Math.max(0,Math.min(slides.length-1,Number(m[1])-1)):0}
    function scale(){var w=stage.clientWidth-28,h=stage.clientHeight-28,s=Math.min(w/1920,h/1080),el=slides[index];if(!el)return;el.style.width='1920px';el.style.height='1080px';el.style.transform='translate(-50%,-50%) scale('+s+')'}
    function saveNote(){if(!data[index])return;data[index].notes=text.value;var saved={};data.forEach(function(item){saved[item.title]=item.notes});localStorage.setItem(noteKey,JSON.stringify(saved));document.getElementById('scriptCount').textContent=text.value.length+'字'}
    function show(next,push){if(push===undefined)push=true;if(initialized)saveNote();index=Math.max(0,Math.min(slides.length-1,next));slides.forEach(function(slide,i){var active=i===index;slide.classList.toggle('active',active);slide.setAttribute('aria-hidden',String(!active))});document.getElementById('counter').textContent=(index+1)+' / '+slides.length;document.getElementById('prev').disabled=index===0;document.getElementById('next').disabled=index===slides.length-1;document.getElementById('pageTitle').textContent=data[index].title;document.getElementById('scriptTitle').textContent=(index+1)+'. '+data[index].title;text.value=data[index].notes;document.getElementById('scriptCount').textContent=text.value.length+'字';document.querySelectorAll('.toc-item').forEach(function(b,i){b.classList.toggle('current',i===index)});if(push)history.replaceState(null,'','#slide='+(index+1));initialized=true;scale()}
    function setEdit(enabled){editing=enabled;document.body.classList.toggle('edit-mode',enabled);document.getElementById('editButton').setAttribute('aria-pressed',String(enabled));document.getElementById('editButton').textContent=enabled?'編集を終了':'スライドを編集';document.querySelectorAll('[data-editable]').forEach(function(el){el.contentEditable=enabled?'plaintext-only':'false';el.spellcheck=enabled})}
    function toggleToc(open){var toc=document.getElementById('toc'),button=document.getElementById('tocButton');toc.classList.toggle('open',open);document.getElementById('scrim').classList.toggle('show',open);button.setAttribute('aria-expanded',String(open));toc.setAttribute('aria-hidden',String(!open));toc.inert=!open;if(open)document.getElementById('tocClose').focus();else button.focus()}
    function download(name,type,content){var blob=new Blob([content],{type:type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
    function setScriptOpen(open,restoreFocus){var button=document.getElementById('scriptButton');panel.classList.toggle('closed',!open);panel.setAttribute('aria-hidden',String(!open));panel.inert=!open;button.setAttribute('aria-pressed',String(open));if(!open&&restoreFocus)button.focus();setTimeout(scale,260)}
    document.getElementById('prev').onclick=function(){show(index-1)};document.getElementById('next').onclick=function(){show(index+1)};document.getElementById('editButton').onclick=function(){setEdit(!editing)};document.getElementById('scriptButton').onclick=function(){setScriptOpen(panel.classList.contains('closed'),true)};
    document.getElementById('tocButton').onclick=function(){toggleToc(true)};document.getElementById('tocClose').onclick=function(){toggleToc(false)};document.getElementById('scrim').onclick=function(){toggleToc(false)};document.querySelectorAll('[data-go-slide]').forEach(function(button){button.onclick=function(){toggleToc(false);show(Number(button.dataset.goSlide)-1)}});
    text.addEventListener('input',saveNote);
    document.getElementById('downloadScript').onclick=function(){saveNote();var md=['# Genspark基本研修｜トークスクリプト',''];data.forEach(function(item,i){md.push('## '+(i+1)+'. '+item.title,'',item.notes,'')});download('APHD_Genspark基本研修_トークスクリプト.md','text/markdown;charset=utf-8',md.join('\n'))};
    document.getElementById('downloadHtml').onclick=function(){saveNote();setEdit(false);var clone=document.documentElement.cloneNode(true);clone.dataset.documentId='download-'+Date.now().toString(36);clone.querySelector('#deckData').textContent=JSON.stringify(data).replaceAll('<','\\u003c');clone.querySelector('body').classList.remove('present','edit-mode');clone.querySelector('#toc').classList.remove('open');clone.querySelector('#scrim').classList.remove('show');clone.querySelectorAll('[contenteditable]').forEach(function(el){el.removeAttribute('contenteditable')});download('APHD_Genspark基本研修_全28ページ.html','text/html;charset=utf-8','<!doctype html>\n'+clone.outerHTML)};
    document.getElementById('presentButton').onclick=function(){setEdit(false);document.body.classList.add('present');if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen();setTimeout(scale,100)};document.addEventListener('fullscreenchange',function(){if(!document.fullscreenElement){document.body.classList.remove('present');scale()}});
    document.querySelectorAll('[data-replaceable]').forEach(function(el){el.addEventListener('click',function(event){if(!editing)return;event.preventDefault();imageTarget=el.tagName==='IMG'?el:el.querySelector('img');picker.click()})});picker.addEventListener('change',function(){var file=picker.files&&picker.files[0];if(!file||!imageTarget)return;var reader=new FileReader();reader.onload=function(){imageTarget.src=reader.result};reader.readAsDataURL(file);picker.value=''});
    document.addEventListener('keydown',function(event){if(event.target.matches('textarea,[contenteditable="plaintext-only"]'))return;if(['ArrowRight','PageDown',' '].includes(event.key)){event.preventDefault();show(index+1)}else if(['ArrowLeft','PageUp'].includes(event.key)){event.preventDefault();show(index-1)}else if(event.key==='Home')show(0);else if(event.key==='End')show(slides.length-1);else if(event.key.toLowerCase()==='e')setEdit(!editing);else if(event.key.toLowerCase()==='s')document.getElementById('scriptButton').click();else if(event.key.toLowerCase()==='f')document.getElementById('presentButton').click()});
    window.addEventListener('resize',scale);window.addEventListener('hashchange',function(){show(currentFromHash(),false)});if(new URLSearchParams(location.search).get('present')==='1'){setScriptOpen(false);document.body.classList.add('present')}index=currentFromHash();show(index,false);
  })();
  </script>
</body>
